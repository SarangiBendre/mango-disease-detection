<!DOCTYPE html>
<html lang="en">
<head>
    <title>Mango Leaf Anthracnose Disease Detection</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container">
    <h1>🌿 Mango Leaf Anthracnose Disease Detection</h1>
    <p class="subtitle">Upload a mango leaf image to detect disease</p>

    <!-- Upload -->
    <div class="upload-area">
        <input type="file" id="fileInput">
        <button onclick="uploadImage()">Upload & Analyze</button>
    </div>

    <!-- Preview -->
    <div class="preview">
        <img id="previewImage" src="">
    </div>

    <!-- Loader -->
    <div id="loader" class="loader hidden"></div>

    <!-- Result -->
    <div id="resultCard" class="result-card hidden">
        <h2 id="resultText"></h2>
        <p id="confidenceText"></p>
    </div>

    <!-- 🌿 Solution (hidden initially) -->
    <div id="solutionCard" class="solution-card hidden">
        <h3>🩺 Solution & Prevention</h3>

        <ul>
            <li>🍃 Remove and destroy infected leaves</li>
            <li>🌿 Apply fungicides (copper-based sprays)</li>
            <li>💧 Avoid excess moisture on leaves</li>
            <li>🌞 Ensure proper sunlight & air circulation</li>
        </ul>
    </div>

</div>

<script src="/static/script.js"></script>
</body>
</html>

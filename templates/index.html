<!DOCTYPE html>
<html>
<head>
    <title>Mango Disease Detection</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
    <div class="card">
        <h1>🌿 Mango Leaf Disease Detection</h1>

        <form id="uploadForm" action="/predict" method="post" enctype="multipart/form-data">
            <input type="file" name="file" required>
            <button type="submit" id="detectBtn">Detect Disease</button>
        </form>

        <!-- Loading -->
        <div id="loading" style="display:none;">
            <div class="spinner"></div>
            <p>Processing Image...</p>
        </div>

        {% if prediction %}
        <div class="result">
            <img src="{{ img_path }}" class="preview">
            <h2>Disease: {{ prediction }}</h2>
            <h3>Confidence: {{ confidence }}%</h3>
        </div>
        {% endif %}
    </div>
</div>

<script>
document.getElementById("uploadForm").addEventListener("submit", function() {
    document.getElementById("loading").style.display = "block";
    document.getElementById("detectBtn").disabled = true;
    document.getElementById("detectBtn").innerText = "Processing...";
});
</script>

</body>
</html>
